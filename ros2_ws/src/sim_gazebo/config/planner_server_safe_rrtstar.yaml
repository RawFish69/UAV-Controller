planner_server_node:
  ros__parameters:
    default_waypoint_speed_mps: 1.2
    default_acceptance_radius_m: 0.4
    default_collision_inflation_m: 2.5
    default_terrain_clearance_m: 2.0
    # Preserve terrain-aware Z generated by sim_py planners (A*/RRT/RRT*).
    path_z_mode: terrain_relative
    low_corridor_altitude_m: 3.0
    low_corridor_blend_start_goal: false
    max_path_altitude_m: 6.0
    validate_segments: true
    validation_step_m: 0.35
    astar_grid_resolution_m: 2.0
    rrt_step_size_m: 3.0
    rrt_goal_tolerance_m: 2.0
    rrt_max_iterations: 8000
    rrt_goal_sample_rate: 0.12
    rrt_star_rewire_radius_m: 8.0
